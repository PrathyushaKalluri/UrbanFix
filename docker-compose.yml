services:
  postgres:
    image: postgres:16-alpine
    container_name: urbanfix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbanfix_db
      POSTGRES_USER: urbanfix_user
      POSTGRES_PASSWORD: urbanfix_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanfix_user -d urbanfix_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
