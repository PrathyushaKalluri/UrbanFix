services:
  postgres:
    image: postgres:16-alpine
    container_name: urbanfix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbanfix_db
      POSTGRES_USER: urbanfix_user
      POSTGRES_PASSWORD: urbanfix_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanfix_user -d urbanfix_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: urbanfix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
